# Auto-deploy the CANAMED platform to Firebase on every push to main.
# Uses the service-account JSON the Firebase init wizard already put into
# the repo as a GitHub Actions secret.
#
# Manual `firebase deploy` from a developer machine continues to work; this
# workflow just keeps the live site in sync with `main` automatically.
#
# Triggers on EVERY push to main (no path filter): dependency bumps and
# CI-only changes will redeploy byte-identical hosting content (a harmless
# no-op), but the live site is guaranteed to always match main. The
# concurrency group below collapses bursts so only the latest push deploys.
#
# SAFETY GATE: the deploy job first waits for this commit's required CI
# checks to all pass, and aborts if any fail — so an untested commit (e.g.
# an admin direct-push that bypassed branch protection) never reaches the
# live site. Manual `workflow_dispatch` runs skip the gate (escape hatch).

name: Deploy CANAMED to Firebase

on:
  push:
    branches: [main]
  # let us trigger a deploy by hand from the Actions tab when needed
  workflow_dispatch:

# read-only token: checkout (contents) + reading this commit's check-runs
permissions:
  contents: read
  checks: read

# only one deploy at a time - cancel any in-flight run if a new push lands
concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy hosting + database rules
    runs-on: ubuntu-latest
    steps:
      # Gate: never ship an untested commit. Wait for this commit's required
      # status checks (the same set branch protection enforces for merges) to
      # all conclude SUCCESS before deploying; abort if any fails. Skipped for
      # manual workflow_dispatch runs. Self-contained (GitHub API via gh) — no
      # third-party actions in the deploy path. Keep REQUIRED in sync with the
      # branch-protection required status checks.
      - name: Wait for required CI to pass on this commit
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          REQUIRED=(
            "node --test"
            "Playwright (chromium)"
            "Playwright (a11y)"
            "Playwright (firefox)"
            "Playwright (mobile-ipad)"
            "Playwright (mobile-iphone)"
            "Playwright (perf)"
            "Playwright (webkit)"
          )
          echo "Gating deploy on ${#REQUIRED[@]} required checks for $SHA"
          deadline=$(( SECONDS + 900 ))
          while true; do
            runs="$(gh api "repos/$REPO/commits/$SHA/check-runs" --paginate \
              --jq '.check_runs[] | [.name, .status, (.conclusion // "")] | @tsv')"
            pending=0
            failed=""
            for name in "${REQUIRED[@]}"; do
              line="$(printf '%s\n' "$runs" | awk -F'\t' -v n="$name" '$1==n{print; exit}')"
              if [ -z "$line" ]; then pending=1; continue; fi
              status="$(printf '%s' "$line" | cut -f2)"
              concl="$(printf '%s' "$line" | cut -f3)"
              if [ "$status" != "completed" ]; then
                pending=1
              elif [ "$concl" != "success" ]; then
                failed="$failed '$name'($concl)"
              fi
            done
            if [ -n "$failed" ]; then
              printf '%s%s%s\n' '::' 'error::' "Required check(s) failed:$failed — deployment aborted."
              exit 1
            fi
            if [ "$pending" -eq 0 ]; then
              echo "All required checks passed — proceeding to deploy."
              break
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              printf '%s%s%s\n' '::' 'error::' "Timed out (15 min) waiting for required checks."
              exit 1
            fi
            echo "Required checks still pending; re-checking in 20s..."
            sleep 20
          done

      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install the Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service-account credentials to a temp file
        # the JSON is held in GitHub Secrets; we materialise it on disk and
        # point Google Application Default Credentials at it for the CLI.
        # NOTE: the missing-secret guard uses `printf` rather than a literal
        # `echo "::error::…"` string because GitHub Actions parses the
        # workflow-command lines from the LOG OUTPUT, including any time
        # the runner prints the script source. A literal `::error::` in
        # the source therefore creates an error annotation on EVERY run
        # (and turns the otherwise-green run red in the UI) even when the
        # branch isn't taken. printf composed at runtime sidesteps this.
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CANAMED_69785 }}
        run: |
          if [ -z "$SA_JSON" ]; then
            printf '%s%s%s\n' '::' 'error::' "FIREBASE_SERVICE_ACCOUNT_CANAMED_69785 secret is missing"
            exit 1
          fi
          echo "$SA_JSON" > "$RUNNER_TEMP/sa.json"

      # Step 1: hosting ALWAYS ships. Firebase deploys are atomic - bundling
      # database into the same step makes hosting fail when database rules
      # can't be deployed (e.g. service-account lacks RTDB Admin). PR #16
      # and #17 both got stuck this way: hosting never shipped because
      # database rules couldn't.
      - name: Deploy hosting
        working-directory: docs/Third_session/PBL_platform
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          firebase deploy \
            --project canamed-69785 \
            --only hosting \
            --non-interactive

      # Step 2: database rules — best-effort. The service account needs the
      # Firebase Realtime Database Admin role granted in Firebase Console →
      # Project settings → Service accounts → github-action-... → IAM
      # permissions. While it doesn't have that role, this step fails
      # gracefully with a clear annotation telling the operator to grant it
      # (or to deploy rules manually with `firebase deploy --only database`).
      - name: Deploy database rules (best-effort)
        working-directory: docs/Third_session/PBL_platform
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          if firebase deploy \
            --project canamed-69785 \
            --only database \
            --non-interactive; then
            echo "Database rules deployed."
          else
            echo "::warning title=Database rules NOT deployed::The service account lacks Firebase Realtime Database Admin. Grant it in Firebase Console → Project settings → Service accounts, or run 'firebase deploy --only database' manually from the platform folder. Hosting was deployed successfully; only the rule changes did not ship."
          fi
