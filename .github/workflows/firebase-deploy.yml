# Auto-deploy the CANAMED platform to Firebase for every commit that lands on
# main. Uses the service-account JSON the Firebase init wizard already put into
# the repo as a GitHub Actions secret.
#
# Manual `firebase deploy` from a developer machine continues to work; this
# workflow just keeps the live site in sync with `main` automatically.
#
# No path filter: dependency bumps and CI-only changes will redeploy
# byte-identical hosting content (a harmless no-op), but the live site is
# guaranteed to always match main. The concurrency group below collapses
# bursts so only the latest commit deploys.
#
# WHY workflow_run AND NOT push (changed 2026-07-17): this used to trigger on
# push and then poll for the required checks with a 15-min budget. That raced
# the post-merge "E2E tests" matrix and lost — routinely. On the #210 merge
# (39539be) the push was at 03:58:07, the wait step gave up at 15m02s, and the
# E2E long pole ("Playwright (webkit)") went green at 04:13:12 — 15m05s. It
# lost by 3 seconds, and every merge was a coin flip that cost a manual
# `gh run rerun <deployRunId> --failed`. Widening the budget could not fix this
# properly: the webkit job's own timeout-minutes is 20, so any budget under
# ~25 min still races on a slow/queued runner. Starting the deploy only once
# E2E has CONCLUDED removes the race by construction rather than by margin.
# Bonus: re-running a flaked E2E fires the deploy automatically (as long as that
# commit is still main's tip — see FRESHNESS), which is the manual step this
# used to cost.
#
# TWO JOBS, and the split is load-bearing: `gate` decides, `deploy` acts. Every
# reason not to ship lives in `gate`, so a step added to `deploy` later cannot
# forget to check it, and a run that must not ship never even materialises the
# service-account credentials on disk.
#
# SAFETY GATE (unchanged, and still the real boundary): `gate` verifies that ALL
# of this commit's required CI checks concluded success, and aborts if any
# failed — so an untested commit (e.g. an admin direct-push that bypassed branch
# protection) never reaches the live site. The workflow_run trigger only decides
# WHEN to look; it never decides whether it is safe to deploy. Manual
# `workflow_dispatch` runs skip the gate (escape hatch).
#
# FRESHNESS (why `gate` also checks main's tip): workflow_run fires in COMPLETION
# order, not commit order, and ANY old E2E run can be re-run by hand at any time.
# Both produce a legitimate "success on main" event for a commit main has since
# moved past — and deploying it would silently ROLL PRODUCTION BACK over a newer
# commit. The concurrency group cannot catch this: it only cancels runs still in
# flight, and the superseding deploy has typically long finished. So `gate` also
# requires the commit to still BE main's tip. Skipping on that basis is normal
# and green, not a failure — the tip's own E2E fires its own deploy.
#
# ⚠ COUPLING: `workflows:` below matches the "E2E tests" workflow by NAME (the
# `name:` in .github/workflows/e2e.yml). Renaming that workflow silently stops
# every auto-deploy — nothing fails, deploys just never fire. Keep the two in
# sync, and see the note on REQUIRED below for the same hazard on check names.
#
# ⚠ ACCEPTED RISK — no E2E run means no deploy AND no signal. Auto-deploy is now
# downstream of E2E, so if the E2E workflow never RUNS for a commit on main (the
# workflow disabled, an e2e.yml syntax error, an Actions outage, or the
# billing/spending-limit lockout that already hit this project's private repo for
# ~11 days — see CLAUDE.md), no workflow_run event ever fires and no deploy run
# appears at all. Nothing turns red; main just silently stops reaching the live
# site. The old push trigger would at least have produced a red timeout here.
# Detect it the same way you verify any deploy:
#   curl -s https://canamed-69785.web.app/sw.js | grep SHELL_VERSION
# and compare against main. Accepted because the failure is loud at the E2E level
# (main goes visibly red / Actions visibly stops) and this repo's Actions are
# healthy; revisit if auto-deploy ever needs to be unattended.

name: Deploy CANAMED to Firebase

on:
  # Fire once the slowest required suite has concluded on main. E2E is the long
  # pole (~15 min); every other required check (Unit tests ~45 s, Functions CI
  # ~20 s) is long done by then, so the gate below clears in seconds.
  workflow_run:
    workflows: ["E2E tests"]
    types: [completed]
  # let us trigger a deploy by hand from the Actions tab when needed
  workflow_dispatch:

# read-only token: checkout (contents) + reading this commit's check-runs
permissions:
  contents: read
  checks: read

# NB: serialisation lives on the `deploy` job, NOT here at workflow level — see
# the comment on that job. A workflow-level group would be entered before `gate`
# runs, so a run that is about to decide "don't ship" would still cancel a valid
# in-flight deployment.

jobs:
  # Decide whether this commit may ship, and which commit that is. Holds no
  # secrets: nothing here can deploy, so a wrong answer costs a skipped run.
  gate:
    name: Verify required CI + freshness
    runs-on: ubuntu-latest
    # Only consider commits that actually landed on main in THIS repo. Each
    # clause is load-bearing:
    #   conclusion == success  — a red/cancelled E2E must not deploy. (The CI
    #                            check below re-verifies; this just avoids noise.)
    #   head_branch == 'main'  — ignore E2E runs for PR/feature branches.
    #   event == 'push'        — workflow_run fires for PR-triggered E2E runs
    #                            too, where head_branch is the PR's SOURCE
    #                            branch. A fork PR from a branch literally named
    #                            "main" would otherwise satisfy the clause above
    #                            and deploy UNREVIEWED FORK CODE. This clause is
    #                            what stops that; do not drop it.
    #   head_repository        — defence in depth on the same fork hazard.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    outputs:
      sha: ${{ steps.target.outputs.sha }}
      ship: ${{ steps.freshness.outputs.ship }}
    steps:
      # Resolve the commit under deploy. For workflow_run, `github.sha` is NOT
      # the commit whose CI we are gating on — it is main's head at event time,
      # which may already have moved on. `workflow_run.head_sha` is the commit
      # the E2E run actually tested, so it is the only correct value here. It is
      # published as a job output so the deploy job checks out exactly the commit
      # verified here — gate one commit and ship another, otherwise.
      - name: Resolve the commit under deploy
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            sha="$RUN_SHA"
          else
            sha="$DISPATCH_SHA"
          fi
          if [ -z "$sha" ]; then
            printf '%s%s%s\n' '::' 'error::' "Could not resolve the commit to deploy (event: $EVENT_NAME)."
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Commit under deploy: $sha"

      # Gate: never ship an untested commit. Verify this commit's required
      # status checks (the same set branch protection enforces for merges) all
      # concluded SUCCESS before deploying; abort if any failed. Skipped for
      # manual workflow_dispatch runs. Self-contained (GitHub API via gh) — no
      # third-party actions in the deploy path.
      #
      # ⚠ Keep REQUIRED in sync with the branch-protection required status
      # checks (`gh api repos/$REPO/branches/main/protection/required_status_checks`).
      # A check missing here is a check that CANNOT block a bad deploy —
      # "functions (load + require)" was required by branch protection but
      # absent from this list until 2026-07-17, so a broken Functions CI would
      # have shipped. Intentionally NOT required (informational only, matching
      # branch protection): "Playwright (mobile-android)", "Rules E2E (emulator)".
      #
      # Since the workflow_run trigger fires only after E2E concludes, this
      # normally passes on the first poll. The budget is generous insurance for
      # a straggler (e.g. a re-queued Unit tests run), not a race to win.
      - name: Wait for required CI to pass on this commit
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -uo pipefail
          REQUIRED=(
            "node --test"
            "Playwright (chromium)"
            "Playwright (a11y)"
            "Playwright (firefox)"
            "Playwright (mobile-ipad)"
            "Playwright (mobile-iphone)"
            "Playwright (perf)"
            "Playwright (webkit)"
            "functions (load + require)"
          )
          echo "Gating deploy on ${#REQUIRED[@]} required checks for $SHA"
          deadline=$(( SECONDS + 1800 ))
          while true; do
            runs="$(gh api "repos/$REPO/commits/$SHA/check-runs" --paginate \
              --jq '.check_runs[] | [.name, .status, (.conclusion // "")] | @tsv')"
            pending=0
            failed=""
            for name in "${REQUIRED[@]}"; do
              line="$(printf '%s\n' "$runs" | awk -F'\t' -v n="$name" '$1==n{print; exit}')"
              if [ -z "$line" ]; then pending=1; continue; fi
              status="$(printf '%s' "$line" | cut -f2)"
              concl="$(printf '%s' "$line" | cut -f3)"
              if [ "$status" != "completed" ]; then
                pending=1
              elif [ "$concl" != "success" ]; then
                failed="$failed '$name'($concl)"
              fi
            done
            if [ -n "$failed" ]; then
              printf '%s%s%s\n' '::' 'error::' "Required check(s) failed:$failed — deployment aborted."
              exit 1
            fi
            if [ "$pending" -eq 0 ]; then
              echo "All required checks passed — proceeding to deploy."
              break
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              printf '%s%s%s\n' '::' 'error::' "Timed out (30 min) waiting for required checks."
              exit 1
            fi
            echo "Required checks still pending; re-checking in 30s..."
            sleep 30
          done

      # Refuse to roll production back. See FRESHNESS in the header: a stale or
      # out-of-order workflow_run completion is a perfectly valid green event for
      # a commit main has moved past, and shipping it would silently revert the
      # live site. Only main's tip ships. A `workflow_dispatch` is an operator
      # deliberately choosing a ref, so it bypasses this (as it does the CI gate).
      #
      # Residual race, accepted: a commit can land between this check and the
      # deploy step, so we may ship a just-superseded tip. That is self-healing —
      # the newer commit's own E2E fires its own deploy — and bounded by the
      # concurrency group, which cancels this run if that deploy starts first.
      - name: Check the commit is still main's tip
        id: freshness
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -uo pipefail
          if [ "$EVENT_NAME" != "workflow_run" ]; then
            echo "Manual dispatch — operator chose this ref; freshness check skipped."
            echo "ship=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tip="$(gh api "repos/$REPO/commits/main" --jq '.sha')"
          if [ -z "$tip" ]; then
            printf '%s%s%s\n' '::' 'error::' "Could not read main's tip to check freshness — refusing to deploy."
            exit 1
          fi
          if [ "$tip" != "$SHA" ]; then
            echo "::warning title=Deploy skipped (superseded)::$SHA is no longer main's tip ($tip). That newer commit deploys via its own E2E run; not rolling production back."
            echo "ship=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$SHA is main's tip — clear to deploy."
          echo "ship=true" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy hosting + database rules
    runs-on: ubuntu-latest
    needs: gate
    # Every reason NOT to ship was decided in `gate`; this is the single place
    # that consumes the verdict. Note `needs.gate.outputs.ship` is a STRING.
    if: needs.gate.outputs.ship == 'true'
    # One deploy at a time; a newer deploy cancels an older in-flight one, so the
    # newest commit wins. This MUST stay on the job rather than the workflow: at
    # workflow level the group is entered before `gate` runs, so a stale E2E
    # re-run — which `gate` is about to reject — would cancel a valid in-flight
    # deployment and then ship nothing, leaving the live site behind main. Gated
    # here, a run that must not ship never enters the group at all.
    concurrency:
      group: firebase-deploy
      cancel-in-progress: true
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          # Pin to the gated commit. Without this, a workflow_run build checks
          # out main's head — which can be a NEWER, ungated commit — so we would
          # verify one commit's CI and ship another's code.
          ref: ${{ needs.gate.outputs.sha }}
          # Nothing here talks to git after checkout (we deploy with the Firebase
          # CLI), so don't leave the job token in .git/config.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install the Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service-account credentials to a temp file
        # the JSON is held in GitHub Secrets; we materialise it on disk and
        # point Google Application Default Credentials at it for the CLI.
        # NOTE: the missing-secret guard uses `printf` rather than a literal
        # `echo "::error::…"` string because GitHub Actions parses the
        # workflow-command lines from the LOG OUTPUT, including any time
        # the runner prints the script source. A literal `::error::` in
        # the source therefore creates an error annotation on EVERY run
        # (and turns the otherwise-green run red in the UI) even when the
        # branch isn't taken. printf composed at runtime sidesteps this.
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CANAMED_69785 }}
        run: |
          if [ -z "$SA_JSON" ]; then
            printf '%s%s%s\n' '::' 'error::' "FIREBASE_SERVICE_ACCOUNT_CANAMED_69785 secret is missing"
            exit 1
          fi
          echo "$SA_JSON" > "$RUNNER_TEMP/sa.json"

      # Step 1: hosting ALWAYS ships. Firebase deploys are atomic - bundling
      # database into the same step makes hosting fail when database rules
      # can't be deployed (e.g. service-account lacks RTDB Admin). PR #16
      # and #17 both got stuck this way: hosting never shipped because
      # database rules couldn't.
      - name: Deploy hosting
        working-directory: docs/Third_session/PBL_platform
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          firebase deploy \
            --project canamed-69785 \
            --only hosting \
            --non-interactive

      # Step 2: database rules — best-effort. The service account needs the
      # Firebase Realtime Database Admin role granted in Firebase Console →
      # Project settings → Service accounts → github-action-... → IAM
      # permissions. While it doesn't have that role, this step fails
      # gracefully with a clear annotation telling the operator to grant it
      # (or to deploy rules manually with `firebase deploy --only database`).
      - name: Deploy database rules (best-effort)
        working-directory: docs/Third_session/PBL_platform
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          if firebase deploy \
            --project canamed-69785 \
            --only database \
            --non-interactive; then
            echo "Database rules deployed."
          else
            echo "::warning title=Database rules NOT deployed::The service account lacks Firebase Realtime Database Admin. Grant it in Firebase Console → Project settings → Service accounts, or run 'firebase deploy --only database' manually from the platform folder. Hosting was deployed successfully; only the rule changes did not ship."
          fi
