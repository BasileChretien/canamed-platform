<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <!-- R3 deep-i18n: privacy-fr.html is now a back-compat redirect to
       the consolidated privacy.html?lang=fr. Bookmarks and inbound
       links from prior workshops keep working. The reviewed French
       legal body lives in privacy.html under <section data-priv-lang="fr">.

       The meta-refresh is the no-JS fallback; the inline-free
       redirect script in privacy-redirect.js handles the
       JS-enabled common case (faster, no flicker, CSP-safe under
       script-src 'self'). -->
  <meta http-equiv="refresh" content="0; url=privacy.html?lang=fr" />
  <title>CaNaMED — Politique de confidentialité</title>
  <link rel="canonical" href="privacy.html?lang=fr" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="privacy.css" />
  <script src="privacy-redirect.js" defer></script>
</head>
<body>
  <main class="privacy">
    <p>Redirection vers la politique de confidentialité —
       <a href="privacy.html?lang=fr">cliquer ici si vous n'êtes pas redirigé·e</a>.</p>
  </main>
</body>
</html>
